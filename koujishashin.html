<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>工事写真撮影アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green-dark: #1a5c2a; --green-mid: #155022;
    --bg: #f4f4f0; --card: #ffffff; --text: #1a1a18;
    --text-sub: #6b6b66; --border: #d0cfc8; --radius: 12px;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--text); overflow-x: hidden; }

  /* ===== 縦向きレイアウト ===== */
  #app-portrait {
    max-width: 520px; margin: 0 auto; padding: 16px 16px 40px;
  }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; color: var(--green-dark); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  h1::before { content: ''; display: inline-block; width: 4px; height: 20px; background: var(--green-dark); border-radius: 2px; }

  #viewfinder-portrait {
    position: relative; width: 100%; aspect-ratio: 4/3;
    background: #0d1a10; border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    touch-action: none; margin-bottom: 16px;
  }

  /* ===== 横向きレイアウト：全画面 ===== */
  #app-landscape {
    display: none;
    position: fixed; inset: 0;
    background: #0d1a10;
    touch-action: none;
  }
  #viewfinder-landscape {
    position: absolute; inset: 0;
  }

  /* キャンバス共通 */
  .preview-canvas { width: 100%; height: 100%; display: block; }
  #canvas-preview { display: none; }

  /* 看板 */
  .sign-overlay {
    position: absolute; right: 10px; bottom: 10px;
    background: var(--green-dark); border: 2px solid #fff;
    border-radius: 2px; padding: 3px; pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .sign-overlay table { width: 100%; border-collapse: collapse; color: #fff; }
  .sign-overlay .top-rows td {
    border: 1px solid #fff; padding: 2px 4px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; font-family: 'Noto Sans JP', sans-serif;
  }
  .sign-overlay .top-rows td:first-child { width: 36%; background: rgba(0,0,0,0.28); font-weight: 500; }
  .sign-overlay .blank-area {
    border: 1px solid #fff; border-top: none;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center; padding: 2px 4px;
  }
  .sign-memo { color: #fff; font-family: 'Noto Sans JP', sans-serif; text-align: center; word-break: break-all; line-height: 1.3; }

  /* 縦向き看板サイズ */
  #sign-portrait { width: 42%; }
  #sign-portrait .top-rows td { font-size: clamp(7px, 2vw, 11px); height: clamp(16px, 4vw, 24px); }
  #sign-portrait .blank-area { min-height: clamp(28px, 7vw, 48px); }
  #sign-portrait .sign-memo { font-size: clamp(7px, 2vw, 11px); }

  /* 横向き看板サイズ：画面幅基準で小さめ */
  #sign-landscape { width: 28%; }
  #sign-landscape .top-rows td { font-size: clamp(8px, 1.4vw, 13px); height: clamp(18px, 2.8vw, 26px); }
  #sign-landscape .blank-area { min-height: clamp(32px, 5.5vw, 52px); }
  #sign-landscape .sign-memo { font-size: clamp(8px, 1.4vw, 13px); }

  /* ズーム表示 */
  .zoom-level {
    position: absolute; left: 10px; bottom: 10px;
    background: rgba(0,0,0,0.6); color: #fff; font-size: 12px;
    padding: 4px 12px; border-radius: 20px; pointer-events: none;
  }
  .zoom-hint {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.55); color: #fff; font-size: 11px;
    padding: 3px 12px; border-radius: 20px; pointer-events: none; transition: opacity 1s;
    white-space: nowrap;
  }

  /* 横向き撮影ボタン（右端縦並び） */
  #landscape-controls {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px; align-items: center;
    z-index: 10;
  }
  /* 看板と被らないよう右端から少し内側＋下 */
  #sign-landscape { right: 10px; bottom: 10px; }
  #landscape-controls { right: calc(28% + 18px); }

  .ls-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    transition: background 0.15s, transform 0.1s;
  }
  .ls-btn:active { transform: scale(0.94); }
  .ls-btn-primary { background: rgba(26,92,42,0.85); border-color: #fff; font-size: 22px; }
  .ls-btn-save { background: rgba(30,77,140,0.85); }
  .ls-label { font-size: 10px; }

  /* フォーム */
  .form-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .section-label { font-size: 12px; font-weight: 700; color: var(--green-dark); margin-bottom: 10px; }
  .field-row { display: grid; grid-template-columns: 72px 1fr; align-items: center; gap: 10px; margin-bottom: 10px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-row label { font-size: 13px; font-weight: 500; color: var(--text-sub); }
  .field-row input, .field-row textarea {
    font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
    padding: 8px 10px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--text); width: 100%; outline: none; transition: border-color 0.15s;
  }
  .field-row input { height: 40px; }
  .field-row textarea { height: 64px; resize: none; line-height: 1.5; }
  .field-row input:focus, .field-row textarea:focus { border-color: var(--green-dark); background: #fff; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; height: 52px; border-radius: var(--radius);
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--text); font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--green-dark); color: #fff; border-color: var(--green-dark); font-size: 17px; }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-save { background: #1e4d8c; color: #fff; border-color: #1e4d8c; }
  #msg { font-size: 13px; color: var(--text-sub); margin-top: 10px; text-align: center; min-height: 18px; }
  #result-area { display: none; margin-bottom: 14px; }
  #result-area img { width: 100%; border-radius: var(--radius); display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .footer { text-align: center; font-size: 11px; color: #b0afa8; margin-top: 20px; }

  #no-camera-msg {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    color: #7a9e82; font-size: 14px; text-align: center;
    padding: 1rem; flex-direction: column; gap: 10px;
  }
  #no-camera-msg .icon { font-size: 40px; }
</style>
</head>
<body>

<!-- 縦向きUI -->
<div id="app-portrait">
  <h1>工事写真撮影</h1>
  <div id="viewfinder-portrait">
    <canvas id="preview-canvas-p" class="preview-canvas"></canvas>
    <canvas id="canvas-preview"></canvas>
    <div id="no-camera-msg">
      <div class="icon">📷</div>
      <div>カメラへのアクセスを許可してください<br><small>ブラウザの設定からカメラを許可してください</small></div>
    </div>
    <div class="sign-overlay" id="sign-portrait">
      <table><tbody class="top-rows">
        <tr><td>工事名</td><td id="s-name-p">　</td></tr>
        <tr><td>場　所</td><td id="s-place-p">　</td></tr>
        <tr><td>日　付</td><td id="s-date-p">　</td></tr>
      </tbody></table>
      <div class="blank-area"><div class="sign-memo" id="s-memo-p"></div></div>
    </div>
    <div class="zoom-hint" id="zoom-hint-p">2本指でズーム調整</div>
    <div class="zoom-level" id="zoom-level-p">🔍 ×1.0</div>
  </div>

  <div id="result-area">
    <img id="result-img" alt="撮影結果" />
  </div>

  <div class="form-card">
    <div class="section-label">▍看板情報</div>
    <div class="field-row"><label>工事名</label><input id="f-name" type="text" placeholder="例: ○○新築工事" /></div>
    <div class="field-row"><label>場所</label><input id="f-place" type="text" placeholder="例: ○○市○○町1-2-3" /></div>
    <div class="field-row"><label>日付</label><input id="f-date" type="date" /></div>
    <div class="field-row"><label>空白欄</label><textarea id="f-memo" placeholder="例: 工種・備考など（任意）"></textarea></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-shoot-p">📷 撮影</button>
    <button class="btn" id="btn-retake-p" style="display:none">↩ 撮り直し</button>
    <button class="btn btn-save" id="btn-download-p" style="display:none">💾 保存</button>
  </div>
  <div id="msg"></div>
  <div class="footer">工事写真撮影アプリ</div>
</div>

<!-- 横向きUI（全画面） -->
<div id="app-landscape">
  <div id="viewfinder-landscape">
    <canvas id="preview-canvas-l" class="preview-canvas"></canvas>
    <div class="sign-overlay" id="sign-landscape">
      <table><tbody class="top-rows">
        <tr><td>工事名</td><td id="s-name-l">　</td></tr>
        <tr><td>場　所</td><td id="s-place-l">　</td></tr>
        <tr><td>日　付</td><td id="s-date-l">　</td></tr>
      </tbody></table>
      <div class="blank-area"><div class="sign-memo" id="s-memo-l"></div></div>
    </div>
    <div class="zoom-hint" id="zoom-hint-l">2本指でズーム調整</div>
    <div class="zoom-level" id="zoom-level-l">🔍 ×1.0</div>
    <div id="landscape-controls">
      <button class="ls-btn ls-btn-primary" id="btn-shoot-l">📷<span class="ls-label">撮影</span></button>
      <button class="ls-btn" id="btn-retake-l" style="display:none">↩<span class="ls-label">撮り直し</span></button>
      <button class="ls-btn ls-btn-save" id="btn-download-l" style="display:none">💾<span class="ls-label">保存</span></button>
    </div>
  </div>
</div>

<script>
const fName = document.getElementById('f-name');
const fPlace = document.getElementById('f-place');
const fDate = document.getElementById('f-date');
const fMemo = document.getElementById('f-memo');
const msgEl = document.getElementById('msg');
const resultArea = document.getElementById('result-area');
const resultImg = document.getElementById('result-img');
const canvasPreview = document.getElementById('canvas-preview');

fDate.value = new Date().toISOString().split('T')[0];

let videoEl = document.createElement('video');
videoEl.autoplay = true; videoEl.playsInline = true; videoEl.muted = true;

let zoomScale = 1.0;
let shooting = false;
let isLandscape = false;

function updateSign() {
  const name = fName.value || '　';
  const place = fPlace.value || '　';
  const date = fDate.value ? fDate.value.replace(/-/g, '/') : '　';
  const memo = fMemo.value || '';
  ['p','l'].forEach(s => {
    document.getElementById(`s-name-${s}`).textContent = name;
    document.getElementById(`s-place-${s}`).textContent = place;
    document.getElementById(`s-date-${s}`).textContent = date;
    document.getElementById(`s-memo-${s}`).textContent = memo;
  });
}
[fName, fPlace, fDate, fMemo].forEach(el => el.addEventListener('input', updateSign));
updateSign();

// レイアウト切替
function applyOrientation() {
  isLandscape = window.innerWidth > window.innerHeight;
  document.getElementById('app-portrait').style.display = isLandscape ? 'none' : 'block';
  document.getElementById('app-landscape').style.display = isLandscape ? 'block' : 'none';
  resizeCanvases();
}

function resizeCanvases() {
  const pc = document.getElementById('preview-canvas-p');
  const rp = document.getElementById('viewfinder-portrait').getBoundingClientRect();
  pc.width = Math.round(rp.width); pc.height = Math.round(rp.height);

  const lc = document.getElementById('preview-canvas-l');
  lc.width = window.innerWidth; lc.height = window.innerHeight;
}

function getActiveCanvas() {
  return isLandscape
    ? document.getElementById('preview-canvas-l')
    : document.getElementById('preview-canvas-p');
}

function renderPreview() {
  if (shooting) return;
  requestAnimationFrame(renderPreview);
  const canvas = getActiveCanvas();
  const ctx = canvas.getContext('2d');
  const cw = canvas.width, ch = canvas.height;
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if (!vw || !vh) return;
  ctx.fillStyle = '#0d1a10';
  ctx.fillRect(0, 0, cw, ch);
  const dw = cw * zoomScale, dh = ch * zoomScale;
  ctx.drawImage(videoEl, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1440 } },
      audio: false
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    document.getElementById('no-camera-msg').style.display = 'none';
    resizeCanvases();
    renderPreview();
    setTimeout(() => {
      document.getElementById('zoom-hint-p').style.opacity = '0';
      document.getElementById('zoom-hint-l').style.opacity = '0';
    }, 3000);
  } catch(e) {
    document.getElementById('no-camera-msg').style.display = 'flex';
    msgEl.textContent = 'カメラが使えません。';
  }
}

window.addEventListener('resize', applyOrientation);
applyOrientation();
startCamera();

// ピンチズーム（縦・横両対応）
function addPinch(el, zoomLevelId) {
  let lastDist = null, lastScale = 1.0;
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      lastScale = zoomScale;
    }
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && lastDist) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      zoomScale = Math.min(1.5, Math.max(0.35, lastScale * (dist / lastDist)));
      const d = Math.round((1 / zoomScale) * 10) / 10;
      document.getElementById(zoomLevelId).textContent = '🔍 ×' + d.toFixed(1);
      // もう一方も同期
      ['zoom-level-p','zoom-level-l'].forEach(id => {
        document.getElementById(id).textContent = '🔍 ×' + d.toFixed(1);
      });
    }
  }, { passive: true });
  el.addEventListener('touchend', () => { lastDist = null; }, { passive: true });
}
addPinch(document.getElementById('viewfinder-portrait'), 'zoom-level-p');
addPinch(document.getElementById('app-landscape'), 'zoom-level-l');

// 看板描画
function drawSign(ctx, canvasW, canvasH) {
  const signW = canvasW * 0.34;
  const margin = canvasW * 0.018;
  const fontSize = Math.max(11, Math.floor(canvasW * 0.016));
  const rowH = fontSize * 2.3;
  const topRows = [
    ['工事名', fName.value || ''],
    ['場　所', fPlace.value || ''],
    ['日　付', fDate.value ? fDate.value.replace(/-/g, '/') : ''],
  ];
  const blankH = rowH * 2.4;
  const signH = rowH * topRows.length + blankH + 8;
  const sx = canvasW - signW - margin;
  const sy = canvasH - signH - margin;
  const labelW = signW * 0.36;
  const lw = Math.max(1, canvasW * 0.001);
  const ob = Math.max(2, canvasW * 0.003);

  ctx.fillStyle = '#1a5c2a'; ctx.fillRect(sx, sy, signW, signH);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = ob;
  ctx.strokeRect(sx + ob/2, sy + ob/2, signW - ob, signH - ob);
  ctx.font = `${fontSize}px 'Noto Sans JP', sans-serif`;
  ctx.textBaseline = 'middle';

  topRows.forEach((row, i) => {
    const ry = sy + 4 + rowH * i;
    if (i > 0) { ctx.strokeStyle = '#fff'; ctx.lineWidth = lw; ctx.beginPath(); ctx.moveTo(sx, ry); ctx.lineTo(sx + signW, ry); ctx.stroke(); }
    ctx.strokeStyle = '#fff'; ctx.lineWidth = lw; ctx.beginPath(); ctx.moveTo(sx + labelW, ry); ctx.lineTo(sx + labelW, ry + rowH); ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(sx + 1, ry + 1, labelW - 2, rowH - 2);
    ctx.fillStyle = '#fff'; ctx.fillText(row[0], sx + 5, ry + rowH / 2);
    const maxW = signW - labelW - 10; let val = row[1];
    while (val.length > 0 && ctx.measureText(val).width > maxW) val = val.slice(0, -1);
    ctx.fillText(val, sx + labelW + 6, ry + rowH / 2);
  });

  const blankTop = sy + 4 + rowH * topRows.length;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(sx, blankTop); ctx.lineTo(sx + signW, blankTop); ctx.stroke();

  const memo = fMemo.value.trim();
  if (memo) {
    const mf = Math.max(10, Math.floor(fontSize * 0.9));
    ctx.font = `${mf}px 'Noto Sans JP', sans-serif`; ctx.fillStyle = '#fff'; ctx.textBaseline = 'top';
    const maxLW = signW - 10; const lines = [];
    for (const raw of memo.split('\n')) {
      let line = '';
      for (const ch of raw) { if (ctx.measureText(line + ch).width > maxLW) { lines.push(line); line = ch; } else line += ch; }
      lines.push(line);
    }
    const lh = mf * 1.5; const totalH = lines.length * lh;
    const startY = blankTop + (blankH - totalH) / 2;
    lines.forEach((line, i) => ctx.fillText(line, sx + 5, startY + i * lh));
  }
}

function shoot() {
  shooting = true;
  const vw = videoEl.videoWidth || 640, vh = videoEl.videoHeight || 480;
  canvasPreview.width = vw; canvasPreview.height = vh;
  const ctx = canvasPreview.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, vw, vh);
  const dw = vw * zoomScale, dh = vh * zoomScale;
  ctx.drawImage(videoEl, (vw - dw) / 2, (vh - dh) / 2, dw, dh);
  drawSign(ctx, vw, vh);

  const dataUrl = canvasPreview.toDataURL('image/jpeg', 0.93);
  resultImg.src = dataUrl;

  if (!isLandscape) {
    resultArea.style.display = 'block';
    document.getElementById('viewfinder-portrait').style.display = 'none';
    msgEl.textContent = '撮影完了！「保存」で端末に画像を保存できます';
    document.getElementById('btn-shoot-p').style.display = 'none';
    document.getElementById('btn-retake-p').style.display = 'flex';
    document.getElementById('btn-download-p').style.display = 'flex';
  } else {
    // 横向きは全画面に結果を表示
    const lc = document.getElementById('preview-canvas-l');
    const lctx = lc.getContext('2d');
    lctx.drawImage(canvasPreview, 0, 0, lc.width, lc.height);
    document.getElementById('sign-landscape').style.display = 'none';
    document.getElementById('zoom-level-l').style.display = 'none';
    document.getElementById('btn-shoot-l').style.display = 'none';
    document.getElementById('btn-retake-l').style.display = 'flex';
    document.getElementById('btn-download-l').style.display = 'flex';
  }

  const dl = () => {
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    const a = document.createElement('a');
    a.download = `koujishashin_${ts}.jpg`; a.href = dataUrl; a.click();
  };
  document.getElementById('btn-download-p').onclick = dl;
  document.getElementById('btn-download-l').onclick = dl;
}

function retake() {
  shooting = false;
  resultArea.style.display = 'none';
  document.getElementById('viewfinder-portrait').style.display = 'block';
  document.getElementById('sign-landscape').style.display = 'block';
  document.getElementById('zoom-level-l').style.display = 'block';
  msgEl.textContent = ''; resultImg.src = '';
  renderPreview();
  ['btn-shoot-p','btn-shoot-l'].forEach(id => document.getElementById(id).style.display = 'flex');
  ['btn-retake-p','btn-download-p','btn-retake-l','btn-download-l'].forEach(id => document.getElementById(id).style.display = 'none');
}

document.getElementById('btn-shoot-p').addEventListener('click', shoot);
document.getElementById('btn-shoot-l').addEventListener('click', shoot);
document.getElementById('btn-retake-p').addEventListener('click', retake);
document.getElementById('btn-retake-l').addEventListener('click', retake);
</script>
</body>
</html>
